name: Email Triage Automation

on:
  schedule:
    - cron: '17 * * * *' # Runs at minute 17 past every hour
  workflow_dispatch: # Allows manual triggering

jobs:
  run-triage:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Restore Processed Emails State
        uses: actions/cache/restore@v4
        with:
          path: processed_ids.txt
          key: processed-state-${{ github.run_id }}
          restore-keys: |
            processed-state-
          
      - name: Run NotifyMail Script
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          URGENCY_THRESHOLD: ${{ vars.URGENCY_THRESHOLD || '50' }}
        run: python notify_mail.py
        
      - name: Save Processed Emails State
        uses: actions/cache/save@v4
        if: always()
        with:
          path: processed_ids.txt
          key: processed-state-${{ github.run_id }}
